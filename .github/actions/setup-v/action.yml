name: Setup V
description: Clone and build the V compiler from source, then add it to PATH.

runs:
  using: composite
  steps:
    - name: Clone and build V
      shell: bash
      run: |
        git clone --depth 1 https://github.com/vlang/v
        cd v
        if [ "$RUNNER_OS" = "Windows" ]; then
          ./makev.bat
          pwd -W >> "$GITHUB_PATH"
        else
          make
          echo "$PWD" >> "$GITHUB_PATH"
        fi
