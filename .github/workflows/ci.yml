name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04         # Linux x86_64
          - ubuntu-24.04-arm     # Linux ARM64
          - macos-26             # macOS ARM64 (Tahoe)

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-v

      - name: Verify formatting
        run: v fmt -verify .

      - name: Vet
        run: v vet rfclib/

      - name: Test
        run: v test rfclib/

      - name: Build
        run: v -prod -o rfc .
